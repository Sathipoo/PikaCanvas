{% extends "base.html" %}

{% block title %}Page Not Found - PikaCanvas{% endblock %}

{% block content %}
<div class="text-center py-5">
    <div class="mb-4">
        <i class="fas fa-search fa-5x text-muted"></i>
    </div>
    <h1 class="display-4">404</h1>
    <h2 class="mb-3">Page Not Found</h2>
    <p class="lead text-muted mb-4">
        The page you're looking for doesn't exist or has been moved.
    </p>
    <div>
        <a href="{{ url_for('dashboard.index') }}" class="btn btn-primary me-2">
            <i class="fas fa-home me-1"></i>Go Home
        </a>
        <a href="{{ url_for('dashboard.gallery') }}" class="btn btn-outline-primary">
            <i class="fas fa-images me-1"></i>View Gallery
        </a>
    </div>
</div>
{% endblock %}

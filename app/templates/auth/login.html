{% extends "base.html" %}

{% block title %}Login - PikaCanvas{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow">
            <div class="card-body">
                <div class="text-center mb-4">
                    <i class="fas fa-palette fa-3x text-primary mb-3"></i>
                    <h2 class="card-title">Welcome to PikaCanvas</h2>
                    <p class="text-muted">Multi-Model AI Image Generation</p>
                </div>

                <form method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" class="form-control" id="username" name="username" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="fas fa-sign-in-alt me-1"></i>Sign In
                    </button>
                </form>

                <div class="mt-4">
                    <h6 class="text-muted">Demo Accounts:</h6>
                    <small class="text-muted">
                        <strong>Admin:</strong> admin / admin123<br>
                        <strong>Demo:</strong> demo / demo123
                    </small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
